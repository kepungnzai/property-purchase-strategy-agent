name: Build and Push Staging Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'data_ingestion/**'
      - 'tests/**'
      - 'deployment/**'
      - 'uv.lock'
      - 'Dockerfile.staging'
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_NAME: ${{ vars.STAGING_PROJECT_ID }}/staging/retail-ai-location-strategy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - id: 'auth'
      #   name: 'Authenticate to Google Cloud'
      #   uses: 'google-github-actions/auth@v2'
      #   with:
      #     workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
      #     service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
      #     create_credentials_file: true
      #     project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # - name: Configure Docker for Artifact Registry
      #   run: |
      #     gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.staging
          push: false
          tags: |
            ${{ env.REGISTRY }}${{ env.IMAGE_NAME }}:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          # build-args: |
          #   COMMIT_SHA=${{ github.sha }}

      - name: Output Image Details
        run: |
          echo "_________________________________________________________________________"
          echo "Docker image pushed successfully!"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Latest: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "View at: https://console.cloud.google.com/artifacts/docker/${{ env.IMAGE_NAME }}"
          echo "_________________________________________________________________________"
